name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  sanitized-history-shape:
    name: Sanitized single-commit feature history
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Confirm clean-base single commit
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          test "$(git merge-base "$BASE" HEAD)" = "$BASE"
          test "$(git rev-list --count "$BASE"..HEAD)" -eq 1

  unit-and-contract-tests:
    name: Python ${{ matrix.python-version }} contracts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m compileall -q src tests
      - run: python -m unittest discover -s tests -v

  public-tree-hygiene:
    name: Public tree generic hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m unittest discover -s tests -p 'test_fixture_hygiene.py' -v

  build-distributions:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/*
          if-no-files-found: error

  distribution-boundary-audit:
    name: Wheel and sdist full-text boundary audit
    needs: build-distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist
      - run: python tests/distribution_audit.py dist/*.whl dist/*.tar.gz

  install-wheel:
    name: Install wheel and import public API
    needs: build-distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist
      - run: python -m venv /tmp/data-kit-wheel
      - run: /tmp/data-kit-wheel/bin/python -m pip install dist/*.whl
      - run: /tmp/data-kit-wheel/bin/python -c "import claude_code_data_kit; print(claude_code_data_kit.SCHEMA_VERSION)"
      - run: /tmp/data-kit-wheel/bin/python -c "import importlib.metadata, claude_code_data_kit as kit; assert importlib.metadata.version('claude-code-data-kit') == kit.__version__; print(kit.__version__)"
      - run: /tmp/data-kit-wheel/bin/python -c "import claude_code_data_kit.collectors, claude_code_data_kit.records, claude_code_data_kit.dedupe, claude_code_data_kit.routing, claude_code_data_kit.versioning, claude_code_data_kit.lab"
      - run: /tmp/data-kit-wheel/bin/python -c "from claude_code_data_kit import CanonicalRecord, stable_id, dedupe_usage, DarioSeizer, RoutingAccumulator"
      - run: /tmp/data-kit-wheel/bin/python -c "from claude_code_data_kit.collectors import ClaudeHookAdapter, ClaudeOTelAdapter, ClaudeStatusLineAdapter, ClaudeTranscriptAdapter"
      - run: /tmp/data-kit-wheel/bin/python -m pip check

  installed-cli-smoke:
    name: Installed CLI offline command smoke
    needs: build-distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist
      - run: python -m venv /tmp/data-kit-cli
      - run: /tmp/data-kit-cli/bin/python -m pip install dist/*.whl
      - name: Exercise all offline CLI paths
        run: |
          CLI=/tmp/data-kit-cli/bin/claude-code-data-kit-lab
          ROOT=$(mktemp -d)/lab
          "$CLI" --root "$ROOT" --version 2.1.214 prepare
          mkdir -p "$ROOT/npm/bin"
          cat > "$ROOT/npm/bin/claude" <<'SH'
          #!/bin/sh
          if [ "$1" = "--version" ]; then
            echo 2.1.214
          else
            echo synthetic-help
          fi
          SH
          chmod +x "$ROOT/npm/bin/claude"
          "$CLI" --root "$ROOT" --version 2.1.214 version
          "$CLI" --root "$ROOT" --version 2.1.214 help
          "$CLI" --root "$ROOT" --version 2.1.214 synthetic-check
          if "$CLI" --root "$ROOT" --version 2.1.214 install >install.out 2>install.err; then
            echo "install unexpectedly ran without --allow-network"
            exit 1
          fi
          grep -q explicit install.err
          if "$CLI" --root "$ROOT" --version 2.1.214 unauthenticated-probe >probe.out 2>probe.err; then
            echo "probe unexpectedly ran without --allow-network"
            exit 1
          fi
          grep -q explicit probe.err
